<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nero AI — Автопилот отзывов</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card-bg: #0f1218; --primary: #818cf8; --text: #ffffff; --border: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-size: 42px; font-weight: 800; letter-spacing: -1px; }
        .header span { color: var(--primary); }

        .pricing { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 32px; transition: 0.3s; }
        .card.featured { border-color: var(--primary); box-shadow: 0 0 20px rgba(129, 140, 248, 0.1); }
        .card h3 { font-size: 24px; margin-bottom: 10px; }
        .price { font-size: 36px; font-weight: 800; margin-bottom: 20px; }
        .features { list-style: none; color: #94a3b8; margin-bottom: 30px; }
        .features li { margin-bottom: 10px; }

        .btn { display: block; width: 100%; padding: 16px; border-radius: 12px; font-weight: 700; text-align: center; cursor: pointer; border: none; transition: 0.2s; text-decoration: none; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-outline { border: 1px solid var(--border); color: #fff; background: transparent; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Модалка */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--primary); padding: 30px; border-radius: 24px; width: 100%; max-width: 450px; position: relative; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #94a3b8; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #94a3b8; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; font-family: inherit; }
        textarea { height: 80px; resize: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>NERO<span>AI</span></h1>
        <p style="color: #94a3b8;">Автоматизация отзывов на маркетплейсах</p>
    </div>

    <div class="pricing">
        <div class="card">
            <h3>Lite</h3>
            <div class="price">2 990 ₽ <small style="font-size: 14px; font-weight: 400;">/мес</small></div>
            <ul class="features">
                <li>• 200 ответов в месяц</li>
                <li>• Базовый ИИ</li>
            </ul>
            <button class="btn btn-outline" onclick="openForm('Lite')">Выбрать Lite</button>
        </div>

        <div class="card featured">
            <h3>Business</h3>
            <div class="price">7 900 ₽ <small style="font-size: 14px; font-weight: 400;">/мес</small></div>
            <ul class="features">
                <li>• Безлимитные ответы</li>
                <li>• Умные допродажи</li>
            </ul>
            <button class="btn btn-primary" onclick="openForm('Business')">Выбрать Business</button>
        </div>
    </div>
</div>
 <div id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeForm()">&times;</span>
        <h2 id="mTitle" style="margin-bottom: 20px;">Настройка</h2>
        <form id="nForm">
            <div class="form-group">
                <label>Ваше имя</label>
                <input type="text" id="Customer_nam" placeholder="Иван" required>
            </div>
            <div class="form-group">
                <label>Площадка</label>
                <select id="Platform">
                    <option value="WB">Wildberries</option>
                    <option value="Ozon">Ozon</option>
                </select>
            </div>
            <div class="form-group">
                <label>API Токен</label>
                <input type="password" id="token" placeholder="Ваш ключ" required>
            </div>
            <div class="form-group">
                <label>Тестовый отзыв</label>
                <textarea id="Review_Text" placeholder="Напишите любой отзыв здесь..." required></textarea>
            </div>
            <input type="hidden" id="plan">
            <button type="submit" class="btn btn-primary" id="sBtn">Активировать</button>
        </form>
    </div>
</div>

<script>
    function openForm(plan) {
        document.getElementById('plan').value = plan;
        document.getElementById('mTitle').innerText = 'Тариф: ' + plan;
        document.getElementById('modal').style.display = 'flex';
    }
    function closeForm() { document.getElementById('modal').style.display = 'none'; }

    document.getElementById('nForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const b = document.getElementById('sBtn');
        b.innerText = 'Отправка...';
        b.disabled = true;

        const data = {
            Customer_nam: document.getElementById('Customer_nam').value,
            Review_Text: document.getElementById('Review_Text').value,
            Platform: document.getElementById('Platform').value,
            plan: document.getElementById('plan').value,
            token: document.getElementById('token').value,
            date: new Date().toLocaleString("ru-RU")
        };

        try {
            const r = await fetch('https://hook.eu1.make.com/1ofv89au8k2e016m86d2ar7w97lgez2t', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if (r.ok) {
                alert('✅ Готово! Данные отправлены.');
                closeForm();
            } else { alert('Ошибка Make. Проверь кнопку Run Once.'); }
        } catch (err) { alert('Сбой сети.'); }
        finally { b.innerText = 'Активировать'; b.disabled = false; }
    });
</script>

</body>
</html>
