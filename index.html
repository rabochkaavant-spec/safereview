<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeReview AI | Панель управления</title>
    <link rel="icon" href="https://img.icons8.com/fluency/48/robot-2.png" type="image/png">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 90%;
            margin-top: 50px;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: #8892b0; margin-bottom: 30px; }

        /* Form Styling */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #ccd6f6; }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }

        .btn {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 255, 127, 0.1);
            color: #00ff7f;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .dot { height: 8px; width: 8px; background-color: #00ff7f; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px #00ff7f; }

        footer { margin-top: auto; padding: 20px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <div class="status-badge"><span class="dot"></span> Система работает стабильно</div>
        <h1>SafeReview AI</h1>
        <p class="subtitle">Управление автоответчиком для WB и Ozon</p>

        <form id="configForm">
            <div class="form-group">
                <label for="apiKey">Ваш API-токен (Стандартный)</label>
                <input type="password" id="apiKey" placeholder="Укажите токен из кабинета селлера" required>
                <small style="color: #666; display: block; margin-top: 5px;">Мы используем токен только для чтения и ответов на отзывы.</small>
            </div>

            <div class="form-group">
                <label for="aiTone">Тональность ответов нейросети</label>
 <select id="aiTone">
                    <option value="polite">Максимально вежливо (Classic)</option>
                    <option value="friendly">Дружелюбно и тепло (Casual)</option>
                    <option value="strict">Строго по делу (Official)</option>
                    <option value="creative">С юмором и креативом (Brand)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="userEmail">Email для уведомлений</label>
                <input type="email" id="userEmail" placeholder="example@mail.ru" required>
            </div>

            <button type="submit" class="btn" id="saveBtn">Активировать автопилот</button>
        </form>
    </div>
</div>

<footer>Powered by SafeReview AI Engine & GitHub Pages</footer>

<script>
    document.getElementById('configForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('saveBtn');
        const originalText = btn.innerText;
        
        // Данные из формы
        const data = {
            apiKey: document.getElementById('apiKey').value,
            tone: document.getElementById('aiTone').value,
            email: document.getElementById('userEmail').value,
            source: 'GitHub_WebApp'
        };

        btn.innerText = 'Сохранение...';
        btn.disabled = true;

        try {
            // ЗАМЕНИ ЭТУ ССЫЛКУ на свой Webhook из Make.com
            const WEBHOOK_URL = 'https://hook.eu1.make.com/твой_код_тут';

            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert('✅ Настройки успешно сохранены! SafeReview AI начнет работу в течение 15 минут.');
            } else {
                throw new Error();
            }
        } catch (error) {
            alert('❌ Ошибка связи с сервером. Попробуйте позже или напишите в поддержку.');
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
